<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>CALIDEX — a California map</title>
<meta name="description" content="CALIDEX — an interactive map of vintage Americana across California, plus every US National Monument and National Park. Tap any dot for its name and Apple Maps directions.">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#0c0e11">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="icons/icon-32.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CALIDEX">
<link rel="stylesheet" href="vendor/leaflet.css">
<style>
  :root{
    --gold:#e7b84b; --gold-bright:#ffd673; --ink:#0c0e11; --panel:#15181d;
    --panel-2:#1c2026; --line:#2a2f37; --text:#e9e6df; --muted:#9aa0a8;
    --mon:#a86fe0; --park:#4cc274;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);background:var(--ink);overflow:hidden;-webkit-text-size-adjust:100%;
  }
  #app{display:flex;flex-direction:column;height:100%}

  header{
    position:relative;flex:0 0 auto;display:flex;align-items:center;gap:14px;
    padding:9px 14px;padding-top:max(9px,env(safe-area-inset-top));
    background:linear-gradient(180deg,#15181d,#101317);
    border-bottom:1px solid var(--line);z-index:1000;
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand h1{
    font:600 17px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    margin:0;letter-spacing:.3px;color:var(--gold-bright);white-space:nowrap;
  }
  .brand h1 b{color:var(--text);font-weight:600}
  .controls{display:flex;align-items:center;gap:8px}

  .fbtn{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;min-height:36px}
  .fbtn:hover{border-color:#3a414b}
  .fbtn.active{border-color:var(--gold);color:var(--gold-bright)}
  .fbtn svg{width:14px;height:14px}
  .fbadge{background:var(--gold);color:#241a04;border-radius:999px;font-size:11px;font-weight:700;padding:1px 6px;min-width:17px;text-align:center}
  .fbadge[hidden]{display:none}

  .panel{position:absolute;top:100%;right:14px;margin-top:6px;z-index:1100;
    width:min(320px,92vw);max-height:72vh;overflow:auto;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.5);padding:12px}
  .panel[hidden]{display:none}
  .psec+.psec{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .plbl{font:11px/1 ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  select{appearance:none;width:100%;margin-top:8px;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:8px 28px 8px 10px;font-size:13px;outline:none;min-height:36px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239aa0a8'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
  select:focus{border-color:var(--gold)}
  .phead{display:flex;align-items:center;justify-content:space-between}
  .pacts button{background:none;border:0;color:var(--gold);font-size:12px;cursor:pointer;padding:2px 4px}
  .pacts button:hover{color:var(--gold-bright)}
  .catlist{display:flex;flex-direction:column;gap:1px;margin-top:8px}
  .cat{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:7px;cursor:pointer;font-size:13px;user-select:none}
  .cat:hover{background:var(--panel-2)}
  .cat input{accent-color:var(--gold);width:16px;height:16px;margin:0;flex:0 0 auto}
  .cat .sw{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1px rgba(0,0,0,.4) inset}
  .cat .lbl{flex:1 1 auto}
  .cat .n{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
  .cat .sw.gold{background:var(--gold)} .cat .sw.monument{background:var(--mon)} .cat .sw.park{background:var(--park)}

  #map{flex:1 1 auto;background:#0c0e11}
  .leaflet-container{background:#0c0e11;font:inherit}
  .leaflet-bar.tools a{background:var(--panel);color:var(--text);width:34px;height:34px;line-height:34px;font-size:16px;text-align:center}
  .leaflet-bar.tools a:hover{background:var(--panel-2)}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:12px 14px;line-height:1.45}
  .leaflet-popup-close-button{color:var(--muted)!important;padding:6px 8px 0 0!important}
  .pop .nm{font-weight:700;font-size:15px;color:var(--text);display:block;margin-bottom:3px}
  .pop .meta{font:11px/1.3 ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
  .pop .meta .dot{color:var(--muted);margin:0 5px}
  .pop .ds{color:var(--muted);font-size:13px;margin:0 0 10px}
  .pop a.dir{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:linear-gradient(180deg,#f0c75e,#d8a838);color:#241a04;font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px}
  .pop a.dir:active{transform:translateY(1px)}

  .leaflet-bar a{background:var(--panel);color:var(--text);border-bottom-color:var(--line)}
  .leaflet-bar a:hover{background:var(--panel-2)}
  .leaflet-control-attribution{background:rgba(12,14,17,.8)!important;color:#7f868f!important}
  .leaflet-control-attribution a{color:#9aa0a8!important}

  #note{position:absolute;left:10px;bottom:24px;z-index:600;background:rgba(21,24,29,.82);
    border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--text);backdrop-filter:blur(4px)}
  #note .row{display:flex;align-items:center;gap:9px}
  #note .row+.row{margin-top:6px}
  #note .sw{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1px rgba(0,0,0,.4) inset}

  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1200}
  #backdrop.show{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:1300;transform:translateY(110%);
    transition:transform .26s cubic-bezier(.2,.8,.2,1);background:var(--panel);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;padding:8px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(0,0,0,.5)}
  #sheet.show{transform:translateY(0)}
  #sheet .grip{width:38px;height:4px;border-radius:3px;background:#3a414b;margin:4px auto 12px}
  #sheet .nm{font-weight:700;font-size:18px;display:block;margin-bottom:4px}
  #sheet .meta{font:11px/1.3 ui-monospace,Menlo,monospace;text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px}
  #sheet .meta .dot{color:var(--muted);margin:0 5px}
  #sheet .ds{color:var(--muted);font-size:14px;margin:0 0 14px}
  #sheet a.dir{display:flex;justify-content:center;align-items:center;gap:7px;text-decoration:none;background:linear-gradient(180deg,#f0c75e,#d8a838);color:#241a04;font-weight:700;font-size:15px;padding:13px;border-radius:11px}

  body.light #map,body.light .leaflet-container{background:#e9eaec}
  @media (max-width:720px){ #note{display:none} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><h1>CALI<b>DEX</b></h1></div>
    <div class="controls">
      <button id="filterBtn" class="fbtn" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M1 2.6a.5.5 0 0 1 .5-.5h13a.5.5 0 0 1 .39.81L10 9.18V14a.5.5 0 0 1-.78.41l-3-2A.5.5 0 0 1 6 12V9.18L1.1 2.91A.5.5 0 0 1 1 2.6z"/></svg>
        Filter <span id="filterBadge" class="fbadge" hidden></span>
      </button>
    </div>
    <div id="filterPanel" class="panel" hidden>
      <div class="psec">
        <label class="plbl" for="region">Region</label>
        <select id="region"><option value="">All California regions</option></select>
      </div>
      <div class="psec">
        <div class="phead"><span class="plbl">Show on map</span><span class="pacts"><button type="button" id="catAll">All</button><button type="button" id="catNone">None</button></span></div>
        <div id="catList" class="catlist"></div>
      </div>
    </div>
  </header>
  <div id="map"><div id="loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--ink);z-index:1500;color:var(--muted)">Loading CALIDEX…</div></div>
</div>

<div id="note">
  <div class="row"><span class="sw" style="background:#e7b84b"></span>Food &amp; drink</div>
  <div class="row"><span class="sw" style="background:#4f9ff0"></span>Shops</div>
  <div class="row"><span class="sw" style="background:#ef5350"></span>Landmarks &amp; stays</div>
  <div class="row"><span class="sw" style="background:#46b863"></span>Parks &amp; playgrounds</div>
  <div class="row"><span class="sw" style="background:#a86fe0"></span>National Monuments</div>
  <div class="row"><span class="sw" style="background:#54d6b4"></span>National Parks</div>
</div>

<div id="backdrop"></div>
<div id="sheet" role="dialog" aria-modal="true"><div class="grip"></div><div id="sheet-body"></div></div>

<script src="vendor/leaflet.js"></script>
<script>
(function(){
  var KIND = {
    gold:     {fill:'#e7b84b', hi:'#ffd673', stroke:'#3a2f12', strokeLight:'#6b541a', label:'California’s Gold'},
    monument: {fill:'#a86fe0', hi:'#c79bf0', stroke:'#2a1a3a', strokeLight:'#5a3a86', label:'National Monument'},
    park:     {fill:'#4cc274', hi:'#7ee0a0', stroke:'#123a22', strokeLight:'#1f6b3d', label:'National Park'}
  };
  // Category order in the filter (gold types first, then the two national layers)
  var CAT_ORDER = ['Restaurants','Bars & Lounges','Sweets & Soda Fountains','Shops',
    'Motels & Neon','Landmarks & Architecture','Parks & Playgrounds','Michelin',
    'National Monuments','National Parks'];
  function catKey(p){ return p.k==='gold' ? p.c : (p.k==='monument' ? 'National Monuments' : 'National Parks'); }

  // Per-category dot colors. {fill, hi=hover, stroke=dark-mode outline, strokeLight=light-mode outline}
  var PALETTE = {
    yellow: {fill:'#e7b84b', hi:'#ffd673', stroke:'#3a2f12', strokeLight:'#6b541a'},
    blue:   {fill:'#4f9ff0', hi:'#8ec4ff', stroke:'#102a45', strokeLight:'#1f4e7a'},
    red:    {fill:'#ef5350', hi:'#ff8a87', stroke:'#3a1413', strokeLight:'#7a2420'},
    green:  {fill:'#46b863', hi:'#79e093', stroke:'#123a22', strokeLight:'#1f6b3d'},
    purple: {fill:'#a86fe0', hi:'#c79bf0', stroke:'#2a1a3a', strokeLight:'#5a3a86'},
    mint:   {fill:'#54d6b4', hi:'#8aecd2', stroke:'#0e3a30', strokeLight:'#1f6b59'}
  };
  var CAT_COLOR = {
    'Restaurants':'yellow', 'Bars & Lounges':'yellow', 'Sweets & Soda Fountains':'yellow', 'Michelin':'yellow',
    'Shops':'blue',
    'Motels & Neon':'red', 'Landmarks & Architecture':'red',
    'Parks & Playgrounds':'green',
    'National Monuments':'purple', 'National Parks':'mint'
  };
  function colorFor(p){ return PALETTE[CAT_COLOR[catKey(p)]] || PALETTE.yellow; }
  function colorForCat(c){ return PALETTE[CAT_COLOR[c]] || PALETTE.yellow; }

  var isMobile = function(){ return window.matchMedia('(max-width:720px)').matches; };
  var isTouch = window.matchMedia('(pointer:coarse)').matches || ('ontouchstart' in window);
  var TAP_PX = isTouch ? 26 : 14;

  var map = L.map('map', {center:[39.5,-98.35], zoom:4, zoomControl:true, preferCanvas:true, worldCopyJump:false});
  L.control.scale({imperial:true,metric:false,position:'bottomright'}).addTo(map);

  var TILES = {
    dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
  };
  var ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>';
  var mode = localStorage.getItem('cg-basemap')==='light' ? 'light' : 'dark';
  var tileLayer = null;
  function setBasemap(m){
    mode=m; localStorage.setItem('cg-basemap',m);
    document.body.classList.toggle('light', m==='light');
    if(tileLayer) map.removeLayer(tileLayer);
    tileLayer=L.tileLayer(TILES[m],{attribution:ATTR,subdomains:'abcd',maxZoom:19,crossOrigin:'anonymous'}).addTo(map);
    if(window.__built) applyFilter();
  }
  setBasemap(mode);

  var canvasRenderer = L.canvas({padding:0.5, tolerance: isTouch ? 12 : 4});
  var layer = L.layerGroup().addTo(map);
  var ALL=[], markers=[], hereMarker=null, CATS=[];
  var catOn = {};

  function radiusForZoom(z){ var r=Math.max(3, Math.min(7, 3+(z-4)*0.5)); return isTouch ? Math.min(8, r+1.5) : r; }
  var curR = radiusForZoom(map.getZoom());

  function dirUrl(u){ return u.replace('?q=', '?daddr=') + '&dirflg=d'; }
  function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function infoHtml(p){
    var col=colorFor(p).fill;
    var meta=(p.k==='gold') ? esc(p.r)+'<span class="dot">•</span>'+esc(p.c) : esc(KIND[p.k].label);
    return '<span class="nm">'+esc(p.n)+'</span>'
      + '<div class="meta" style="color:'+col+'">'+meta+'</div>'
      + (p.d?'<p class="ds">'+esc(p.d)+'</p>':'')
      + '<a class="dir" href="'+esc(dirUrl(p.u))+'" target="_blank" rel="noopener">➤ Directions in Apple Maps</a>';
  }

  var sheet=document.getElementById('sheet'), backdrop=document.getElementById('backdrop'), sheetBody=document.getElementById('sheet-body');
  function openSheet(p){ sheetBody.innerHTML=infoHtml(p); sheet.classList.add('show'); backdrop.classList.add('show'); }
  function closeSheet(){ sheet.classList.remove('show'); backdrop.classList.remove('show'); }
  backdrop.addEventListener('click', closeSheet);
  function openInfo(p, latlng){
    if(isMobile()){ openSheet(p); }
    else { L.popup({maxWidth:280,autoPan:true}).setLatLng(latlng).setContent('<div class="pop">'+infoHtml(p)+'</div>').openOn(map); }
  }

  function build(list){
    layer.clearLayers(); markers=[];
    var light = mode==='light';
    list.forEach(function(p){
      var k=colorFor(p);
      var m=L.circleMarker([p.lat,p.lng], {renderer:canvasRenderer, radius:curR, weight: light?1.5:1,
        color: light?k.strokeLight:k.stroke, fillColor:k.fill, fillOpacity: light?1:.92});
      m._k=k; m._p=p;
      m.on('mouseover', function(){ m.setStyle({fillColor:k.hi, radius:curR+1}); });
      m.on('mouseout',  function(){ m.setStyle({fillColor:k.fill, radius:curR}); });
      m.addTo(layer); markers.push(m);
    });
  }

  function applyFilter(){
    var r=document.getElementById('region').value;
    var out=ALL.filter(function(p){
      if(catOn[catKey(p)]===false) return false;
      if(p.k==='gold' && r && p.r!==r) return false;
      return true;
    });
    build(out);
    updateBadge();
  }

  function updateBadge(){
    var off=CATS.filter(function(c){ return catOn[c]===false; }).length;
    var b=document.getElementById('filterBadge'), btn=document.getElementById('filterBtn');
    if(off>0){ b.textContent=off; b.hidden=false; btn.classList.add('active'); }
    else { b.hidden=true; btn.classList.remove('active'); }
  }

  function buildCatUI(counts){
    var present={}; ALL.forEach(function(p){ present[catKey(p)]=1; });
    CATS = CAT_ORDER.filter(function(c){ return present[c]; });
    Object.keys(present).forEach(function(c){ if(CATS.indexOf(c)<0) CATS.push(c); });
    var html='';
    CATS.forEach(function(c){
      catOn[c]=true;
      html+='<label class="cat"><input type="checkbox" data-cat="'+esc(c)+'" checked>'
        +'<span class="sw" style="background:'+colorForCat(c).fill+'"></span><span class="lbl">'+esc(c)+'</span>'
        +'<span class="n">'+(counts[c]||0)+'</span></label>';
    });
    document.getElementById('catList').innerHTML=html;
  }

  map.on('zoomend', function(){
    var r=radiusForZoom(map.getZoom());
    if(r!==curR){ curR=r; markers.forEach(function(m){ m.setRadius(r); }); }
  });

  // Tap-nearest: open the closest dot to the tap (within TAP_PX) — no bullseye needed.
  map.on('click', function(e){
    var cp=e.containerPoint, best=null, bestD=Infinity;
    for(var i=0;i<markers.length;i++){
      var mp=map.latLngToContainerPoint(markers[i].getLatLng());
      var dx=mp.x-cp.x, dy=mp.y-cp.y, d=dx*dx+dy*dy;
      if(d<bestD){ bestD=d; best=markers[i]; }
    }
    if(best && bestD <= TAP_PX*TAP_PX){ openInfo(best._p, best.getLatLng()); }
  });

  var Tools = L.Control.extend({options:{position:'topleft'},
    onAdd:function(){
      var bar=L.DomUtil.create('div','leaflet-bar tools');
      var loc=L.DomUtil.create('a','',bar); loc.href='#'; loc.title='Find places near me'; loc.innerHTML='◎'; loc.setAttribute('role','button');
      var bm =L.DomUtil.create('a','',bar); bm.href='#';  bm.title='Toggle light / dark map'; bm.innerHTML = mode==='light'?'☾':'☀';
      L.DomEvent.on(loc,'click',function(e){ L.DomEvent.stop(e); locate(); });
      L.DomEvent.on(bm,'click',function(e){ L.DomEvent.stop(e); setBasemap(mode==='light'?'dark':'light'); bm.innerHTML = mode==='light'?'☾':'☀'; });
      return bar;
    }});
  map.addControl(new Tools());

  function locate(){
    if(!navigator.geolocation){ alert('Location is not available in this browser.'); return; }
    navigator.geolocation.getCurrentPosition(function(pos){
      var ll=[pos.coords.latitude,pos.coords.longitude];
      if(hereMarker) map.removeLayer(hereMarker);
      hereMarker=L.circleMarker(ll,{renderer:canvasRenderer,radius:7,weight:3,color:'#fff',fillColor:'#2e8bff',fillOpacity:1}).addTo(map);
      hereMarker.bindTooltip('You are here',{direction:'top',offset:[0,-6]});
      map.flyTo(ll, 11, {duration:0.8});
    }, function(err){ alert('Could not get your location'+(err&&err.message?': '+err.message:'.')); },
    {enableHighAccuracy:true, timeout:10000, maximumAge:60000});
  }

  Promise.all([
    fetch('places.json').then(function(r){return r.json();}),
    fetch('national.json').then(function(r){return r.json();}).catch(function(){return [];})
  ]).then(function(res){
    var gold=res[0].map(function(p){ p.k='gold'; return p; });
    ALL=gold.concat(res[1]);

    var counts={};
    ALL.forEach(function(p){ var c=catKey(p); counts[c]=(counts[c]||0)+1; });

    var seen={}, regions=[]; gold.forEach(function(p){ if(p.r&&!seen[p.r]){seen[p.r]=1;regions.push(p.r);} });
    var sel=document.getElementById('region');
    regions.forEach(function(rn){ var o=document.createElement('option'); o.value=rn; o.textContent=rn; sel.appendChild(o); });

    buildCatUI(counts);
    window.__built=true;
    build(ALL);
    var el=document.getElementById('loading'); if(el) el.remove();
    requestAnimationFrame(function(){ map.invalidateSize(); map.fitBounds([[24.4,-125.0],[49.4,-66.9]]); });

    sel.addEventListener('change', applyFilter);

    // filter panel open/close
    var btn=document.getElementById('filterBtn'), panel=document.getElementById('filterPanel');
    function openPanel(o){ if(o){ panel.removeAttribute('hidden'); } else { panel.setAttribute('hidden',''); } btn.setAttribute('aria-expanded', o?'true':'false'); }
    btn.addEventListener('click', function(e){ e.stopPropagation(); openPanel(panel.hasAttribute('hidden')); });
    panel.addEventListener('click', function(e){ e.stopPropagation(); });
    document.addEventListener('click', function(){ if(!panel.hasAttribute('hidden')) openPanel(false); });

    document.getElementById('catList').addEventListener('change', function(e){
      var cb=e.target; if(cb && cb.matches('input[type=checkbox]')){ catOn[cb.getAttribute('data-cat')]=cb.checked; applyFilter(); }
    });
    function setAll(v){ CATS.forEach(function(c){ catOn[c]=v; }); document.querySelectorAll('#catList input[type=checkbox]').forEach(function(cb){ cb.checked=v; }); applyFilter(); }
    document.getElementById('catAll').addEventListener('click', function(){ setAll(true); });
    document.getElementById('catNone').addEventListener('click', function(){ setAll(false); });

    document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeSheet(); openPanel(false); } });
  }).catch(function(e){
    var el=document.getElementById('loading'); if(el) el.textContent='Could not load data — '+e;
  });

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
})();
</script>
</body>
</html>
