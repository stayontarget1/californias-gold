<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>California's Gold — a map</title>
<meta name="description" content="An interactive map of vintage Americana across Southern California — programmatic architecture, neon, motor courts, and old-school institutions worth pulling over for.">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="vendor/leaflet.css">
<style>
  :root{
    --gold:#e7b84b; --gold-bright:#ffd673; --ink:#0c0e11; --panel:#15181d;
    --panel-2:#1c2026; --line:#2a2f37; --text:#e9e6df; --muted:#9aa0a8;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);background:var(--ink);overflow:hidden;
    -webkit-text-size-adjust:100%;
  }
  #app{display:flex;flex-direction:column;height:100%}

  header{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 14px;background:linear-gradient(180deg,#15181d,#101317);
    border-bottom:1px solid var(--line);z-index:1000;
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand h1{
    font:600 17px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    margin:0;letter-spacing:.3px;color:var(--gold-bright);white-space:nowrap;
  }
  .brand h1 b{color:var(--text);font-weight:600}
  .brand .sub{color:var(--muted);font-size:12px;white-space:nowrap}
  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  input[type=search],select{
    appearance:none;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;
    outline:none;min-height:34px;
  }
  input[type=search]{width:190px}
  input[type=search]:focus,select:focus{border-color:var(--gold)}
  select{padding-right:26px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239aa0a8'/></svg>");background-repeat:no-repeat;background-position:right 9px center}
  .count{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .count b{color:var(--gold-bright)}

  #map{flex:1 1 auto;background:#0c0e11}
  .leaflet-container{background:#0c0e11;font:inherit}

  /* Popups */
  .leaflet-popup-content-wrapper{
    background:var(--panel);color:var(--text);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:12px 14px;line-height:1.45}
  .leaflet-popup-close-button{color:var(--muted)!important;padding:6px 8px 0 0!important}
  .pop .nm{font-weight:700;font-size:15px;color:var(--text);display:block;margin-bottom:2px}
  .pop .meta{font:11px/1.3 ui-monospace,Menlo,monospace;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .pop .meta .dot{color:var(--muted);margin:0 5px}
  .pop .ds{color:var(--muted);font-size:13px;margin:0 0 10px}
  .pop a.dir{
    display:inline-flex;align-items:center;gap:6px;text-decoration:none;
    background:linear-gradient(180deg,#f0c75e,#d8a838);color:#241a04;font-weight:700;
    font-size:13px;padding:8px 12px;border-radius:9px;
  }
  .pop a.dir:active{transform:translateY(1px)}

  .leaflet-bar a{background:var(--panel);color:var(--text);border-bottom-color:var(--line)}
  .leaflet-bar a:hover{background:var(--panel-2)}
  .leaflet-control-attribution{background:rgba(12,14,17,.8)!important;color:#7f868f!important}
  .leaflet-control-attribution a{color:#9aa0a8!important}

  #note{
    position:absolute;left:10px;bottom:24px;z-index:600;max-width:240px;
    background:rgba(21,24,29,.82);border:1px solid var(--line);border-radius:9px;
    padding:8px 10px;font-size:11px;color:var(--muted);backdrop-filter:blur(4px);
  }
  #note b{color:var(--gold-bright)}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--ink);z-index:1500;color:var(--muted);font-size:14px}

  @media (max-width:640px){
    .brand .sub{display:none}
    input[type=search]{width:130px;flex:1 1 auto}
    .controls{flex:1 1 100%;order:3}
    #note{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>CALIFORNIA'S <b>GOLD</b></h1>
      <span class="sub">vintage Americana worth pulling over for</span>
    </div>
    <div class="controls">
      <input type="search" id="q" placeholder="Search places…" autocomplete="off" spellcheck="false">
      <select id="region"><option value="">All regions</option></select>
      <span class="count" id="count">…</span>
    </div>
  </header>
  <div id="map">
    <div id="loading">Loading the gold…</div>
  </div>
</div>
<div id="note">Tap any <b>gold dot</b> for the name, a note, and Apple&nbsp;Maps directions.</div>

<script src="vendor/leaflet.js"></script>
<script>
(function(){
  var map = L.map('map', {
    center:[34.05,-118.24], zoom:9, zoomControl:true,
    preferCanvas:true, worldCopyJump:false
  });
  L.control.scale({imperial:true,metric:false,position:'bottomright'}).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  var canvasRenderer = L.canvas({padding:0.5});
  var layer = L.layerGroup().addTo(map);
  var ALL = [], markers = [];

  function dirUrl(u){
    // Turn the catalog's "?q=ADDR" search link into an Apple Maps directions link.
    return u.replace('?q=', '?daddr=') + '&dirflg=d';
  }
  function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function popupHtml(p){
    return '<div class="pop">'
      + '<span class="nm">'+esc(p.n)+'</span>'
      + '<div class="meta">'+esc(p.r)+'<span class="dot">•</span>'+esc(p.c)+'</div>'
      + (p.d?'<p class="ds">'+esc(p.d)+'</p>':'')
      + '<a class="dir" href="'+esc(dirUrl(p.u))+'" target="_blank" rel="noopener">➤ Directions in Apple Maps</a>'
      + '</div>';
  }

  function build(list){
    layer.clearLayers(); markers = [];
    list.forEach(function(p){
      var m = L.circleMarker([p.lat,p.lng], {
        renderer:canvasRenderer, radius:5, weight:1,
        color:'#3a2f12', fillColor:'#e7b84b', fillOpacity:.92
      });
      m._p = p;
      m.on('click', function(){ m.bindPopup(popupHtml(p),{maxWidth:280,autoPan:true}).openPopup(); });
      m.on('mouseover', function(){ m.setStyle({fillColor:'#ffd673',radius:6}); });
      m.on('mouseout',  function(){ m.setStyle({fillColor:'#e7b84b',radius:5}); });
      m.addTo(layer); markers.push(m);
    });
    document.getElementById('count').innerHTML = '<b>'+list.length+'</b> places';
  }

  function applyFilter(){
    var q = document.getElementById('q').value.trim().toLowerCase();
    var r = document.getElementById('region').value;
    var out = ALL.filter(function(p){
      if(r && p.r!==r) return false;
      if(q && (p.n+' '+p.d+' '+p.c+' '+p.r).toLowerCase().indexOf(q)<0) return false;
      return true;
    });
    build(out);
  }

  fetch('places.json').then(function(r){return r.json();}).then(function(data){
    ALL = data;
    // region dropdown in catalog order of first appearance
    var seen = {}, regions = [];
    data.forEach(function(p){ if(!seen[p.r]){seen[p.r]=1; regions.push(p.r);} });
    var sel = document.getElementById('region');
    regions.forEach(function(rn){
      var o=document.createElement('option'); o.value=rn; o.textContent=rn; sel.appendChild(o);
    });
    build(data);
    var el=document.getElementById('loading'); if(el) el.remove();
    var bounds = L.latLngBounds(data.map(function(p){return [p.lat,p.lng];}));
    requestAnimationFrame(function(){
      map.invalidateSize();
      if(bounds.isValid()) map.fitBounds(bounds.pad(0.03));
    });
    document.getElementById('q').addEventListener('input', applyFilter);
    sel.addEventListener('change', applyFilter);
  }).catch(function(e){
    document.getElementById('loading').textContent = 'Could not load places.json — '+e;
  });
})();
</script>
</body>
</html>
